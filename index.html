<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a0a;
    }

    .calculator {
      background: #111;
      padding: 22px;
      border-radius: 20px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.8);
      width: 320px;
      border: 1px solid #000000;
      position: relative;
    }

    .display {
      background: #000;
      color: #fff;
      font-size: 2.6rem;
      padding: 18px;
      border-radius: 12px;
      text-align: right;
      margin-bottom: 15px;
      overflow-x: auto;
      border: 1px solid #000000;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      position: relative;
      overflow: hidden;
      padding: 20px;
      font-size: 1.2rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 500;
      transform: translateY(0);
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.2s;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.6);
      filter: brightness(1.2);
    }

    button:active {
      transform: scale(0.92);
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.8);
    }

    /* efeito ripple */
    button::after {
      content: "";
      position: absolute;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    button:active::after {
      animation: ripple 0.5s ease-out;
    }

    @keyframes ripple {
      from {
        width: 0;
        height: 0;
        opacity: 0.7;
      }
      to {
        width: 200px;
        height: 200px;
        opacity: 0;
      }
    }

    .btn-number {
      background: #333333;
      color: #fff;
    }

    .btn-operator {
      background: #ff9f0a;
      color: #fff;
    }

    .btn-equal {
      background: #ff9f0a;
      color: #000;
      grid-column: span 2;
      font-weight: bold;
    }

    .btn-clear {
      background: #333;
      color: #fff;
      grid-column: span 2;
    }

    .calculator::before {
      content: "";
      position: absolute;
      width: 340px;
      height: 340px;
      background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
      z-index: -1;
      filter: blur(20px);
    }
  </style>
</head>
<body>

  <div class="calculator">
    <div id="display" class="display">0</div>

    <div class="buttons">
      <button class="btn-clear" onclick="clearDisplay()">C</button>
      <button class="btn-operator" onclick="appendValue('%')">%</button>
      <button class="btn-operator" onclick="appendValue('/')">÷</button>
      <button class="btn-number" onclick="appendValue('9')">9</button>
      <button class="btn-number" onclick="appendValue('8')">8</button>
      <button class="btn-number" onclick="appendValue('7')">7</button>
      <button class="btn-operator" onclick="appendValue('*')">×</button>
      <button class="btn-number" onclick="appendValue('4')">4</button>
      <button class="btn-number" onclick="appendValue('5')">5</button>
      <button class="btn-number" onclick="appendValue('6')">6</button>
      <button class="btn-operator" onclick="appendValue('-')">−</button>
      <button class="btn-number" onclick="appendValue('1')">1</button>
      <button class="btn-number" onclick="appendValue('2')">2</button>
      <button class="btn-number" onclick="appendValue('3')">3</button>
      <button class="btn-operator" onclick="appendValue('+')">+</button>
      <button class="btn-number" onclick="appendValue('.')">.</button>
      <button class="btn-number" onclick="appendValue('0')">0</button>
      <button class="btn-equal" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let display = document.getElementById('display');

    function appendValue(value) {
      if (display.innerText === '0') {
        display.innerText = value;
      } else {
        display.innerText += value;
      }
    }

    function clearDisplay() {
      display.innerText = '0';
    }

    function calculate() {
      try {
        display.innerText = eval(display.innerText);
      } catch {
        display.innerText = 'Erro';
      }
    }

    document.addEventListener('keydown', function(event) {
      const key = event.key;

      if (!isNaN(key) || ['+', '-', '*', '/', '.'].includes(key)) {
        appendValue(key);
      } else if (key === 'Enter') {
        calculate();
      } else if (key === 'Backspace') {
        display.innerText = display.innerText.slice(0, -1) || '0';
      } else if (key.toLowerCase() === 'c') {
        clearDisplay();
      }
    });
  </script>

</body>
</html>
